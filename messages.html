<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVA • Сообщения</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/messages.css">
</head>
<body class="messages-page">
    <!-- Верхняя панель -->
    <div class="messages-top-bar">
        <div class="messages-left">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="#262626" onclick="window.location.href='profile.html'">
                <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
            </svg>
        </div>
        
        <div class="messages-center">
            <span class="logo">NOVA</span>
        </div>
        
        <div class="messages-right">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="#262626" onclick="openNewChat()">
                <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
            </svg>
        </div>
    </div>

    <!-- Поиск -->
    <div class="search-box">
        <input type="text" class="search-input" placeholder="🔍 Поиск" id="searchInput">
    </div>

    <!-- Список чатов -->
    <div class="chats-container">
        <div class="chats-list" id="chatsList">
            <!-- Чаты будут загружаться сюда -->
            <div class="empty-chats">
                <h3>Ваши сообщения</h3>
                <p>Начните общение с друзьями</p>
                <button class="start-chat-btn" onclick="openNewChat()">Написать сообщение</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно нового чата -->
    <div class="modal" id="newChatModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Новое сообщение</h3>
                <button class="close-btn" onclick="closeModal()">×</button>
            </div>
            <div class="users-list" id="usersList">
                <!-- Пользователи будут загружаться -->
            </div>
        </div>
    </div>

    <script type="module">
        import { checkAuth } from './js/auth.js'
        import { initMessages, openNewChat, closeModal } from './js/messages.js'
        
        window.openNewChat = openNewChat
        window.closeModal = closeModal
        
        // Проверяем авторизацию и загружаем чаты
        const user = await checkAuth()
        if (user) {
            initMessages()
        }
    </script>
</body>
</html>
