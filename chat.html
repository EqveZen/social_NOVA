<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NOVA • Чат</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/chat.css">
</head>
<body class="chat-page">
    <!-- Верхняя панель -->
    <div class="chat-top-bar">
        <button class="chat-back-btn" onclick="window.location.href='messages.html'">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="#262626">
                <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
            </svg>
        </button>
        
        <div class="chat-user-info" id="chatUserInfo">
            <div class="chat-user-avatar" id="chatAvatar">?</div>
            <div class="chat-user-details">
                <div class="chat-user-name" id="chatUserName">Загрузка...</div>
                <div class="chat-user-status" id="chatUserStatus">•••</div>
            </div>
        </div>
        
        <button class="chat-options-btn" onclick="showChatOptions()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="#262626">
                <path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/>
            </svg>
        </button>
    </div>

    <!-- Область сообщений -->
    <div class="messages-container" id="messagesContainer">
        <!-- Сообщения будут загружаться сюда -->
        <div class="date-divider">
            <span>Сегодня</span>
        </div>
    </div>

    <!-- Индикатор печатания (скрыт по умолчанию) -->
    <div class="typing-indicator" id="typingIndicator" style="display: none;">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <!-- Нижняя панель ввода -->
    <div class="chat-input-area">
        <button class="attach-btn" onclick="attachFile()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                <path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/>
            </svg>
        </button>
        
        <div class="message-input-wrapper">
            <input type="text" class="message-input" id="messageInput" placeholder="Сообщение..." autocomplete="off">
        </div>
        
        <button class="send-btn" id="sendBtn" disabled onclick="sendMessage()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            </svg>
        </button>
    </div>

    <!-- Шаблон сообщения (скрытый) -->
    <template id="messageTemplate">
        <div class="message-wrapper">
            <div class="message-bubble">
                <div class="message-text"></div>
                <div class="message-time">
                    <span class="time-text"></span>
                    <span class="message-status"></span>
                </div>
            </div>
        </div>
    </template>

    <script type="module">
        import { checkAuth } from './js/auth.js'
        import { initChat, sendMessage, attachFile, showChatOptions } from './js/chat.js'
        
        window.sendMessage = sendMessage
        window.attachFile = attachFile
        window.showChatOptions = showChatOptions
        
        // Получаем ID чата из URL
        const urlParams = new URLSearchParams(window.location.search)
        const chatId = urlParams.get('id')
        
        if (!chatId) {
            window.location.href = 'messages.html'
        } else {
            // Проверяем авторизацию и загружаем чат
            const user = await checkAuth()
            if (user) {
                initChat(chatId)
            }
        }
    </script>
</body>
</html>
