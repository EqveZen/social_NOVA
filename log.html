<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVA • Вход</title>
    <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <h1>NOVA</h1>
                <p>мессенджер</p>
            </div>
            
            <form id="loginForm" class="auth-form">
                <div class="auth-input-group">
                    <input type="email" class="auth-input" id="loginEmail" placeholder="Email" required>
                </div>
                
                <div class="auth-input-group">
                    <input type="password" class="auth-input" id="loginPassword" placeholder="Пароль" required>
                </div>
                
                <!-- КНОПКА ПО ЦЕНТРУ -->
                <button type="submit" class="auth-button">Войти</button>
                
                <div class="auth-links">
                    <a href="reg.html" class="auth-link">Создать аккаунт</a>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { login } from './js/auth.js'
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault()
            
            const email = document.getElementById('loginEmail').value.trim()
            const password = document.getElementById('loginPassword').value
            
            await login(email, password)
        })
    </script>
</body>
</html>
