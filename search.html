<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NOVA • Поиск</title>
    <link rel="stylesheet" href="css/search.css">
</head>
<body class="search-page">
    <!-- Верхняя панель -->
    <div class="search-header">
        <button class="search-back-btn" onclick="window.location.href='messages.html'">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
            </svg>
        </button>
        <input type="text" id="searchInput" placeholder="Поиск по имени или email" autofocus>
    </div>

    <!-- Результаты -->
    <div class="search-results" id="searchResults">
        <div class="no-results">Введите имя для поиска</div>
    </div>

    <script type="module">
        import { checkAuth } from './js/auth.js'
        import { initSearch } from './js/search.js'
        
        const user = await checkAuth()
        if (user) {
            initSearch()
        }
    </script>
</body>
</html>
