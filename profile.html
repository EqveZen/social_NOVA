<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVA • Профиль</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/profile.css">
</head>
<body>
    <div class="profile-container">
        <!-- Верхняя навигация -->
        <div class="top-nav">
            <div class="logo">NOVA</div>
            <div>
                <button class="nav-btn" onclick="window.location.href='feed.html'">Лента</button>
                <button class="nav-btn active" onclick="window.location.href='profile.html'">Профиль</button>
                <button class="logout-btn" onclick="window.logout()">Выйти</button>
            </div>
        </div>

        <!-- Шапка профиля -->
        <div class="profile-header">
            <div class="avatar" onclick="document.getElementById('avatarInput').click()">
                <img id="avatarImg" class="avatar-img" src="" alt="" style="display: none;">
                <span id="avatarText">?</span>
            </div>
            <input type="file" id="avatarInput" accept="image/*">
            
            <div class="profile-info">
                <div class="profile-name-section">
                    <span id="profileName" class="profile-name">Загрузка...</span>
                    <button class="edit-toggle" onclick="window.toggleEditForm()">✏️ Редактировать профиль</button>
                </div>
                
                <div class="profile-stats">
                    <div class="stat">
                        <span class="stat-value" id="postsCount">0</span>
                        <span class="stat-label">публикаций</span>
                    </div>
                    <div class="stat">
                        <span class="stat-value" id="followersCount">0</span>
                        <span class="stat-label">подписчиков</span>
                    </div>
                    <div class="stat">
                        <span class="stat-value" id="followingCount">0</span>
                        <span class="stat-label">подписок</span>
                    </div>
                </div>
                
                <div class="profile-bio">
                    <div id="profileEmail" class="fullname"></div>
                    <div>🚀 Социальная сеть NOVA</div>
                    <a href="#" class="website">nova.social</a>
                </div>
            </div>
        </div>

        <!-- Форма редактирования -->
        <div id="editForm" class="edit-form">
            <h3>Редактировать профиль</h3>
            <div class="input-group">
                <input type="text" id="editUsername" required>
                <label>Имя пользователя</label>
            </div>
            <div class="input-group">
                <input type="email" id="editEmail" required>
                <label>Email</label>
            </div>
            <div class="input-group">
                <input type="text" id="editBio" placeholder="О себе">
                <label>О себе</label>
            </div>
            <div class="form-actions">
                <button class="save-btn" onclick="window.updateProfile()">Сохранить</button>
                <button class="cancel-btn" onclick="window.toggleEditForm()">Отмена</button>
            </div>
        </div>

        <!-- Сетка постов -->
        <div id="userPosts">
            <div id="postsList" class="posts-grid">
                <!-- Посты будут загружаться сюда -->
            </div>
        </div>
    </div>

    <script type="module">
        import { logout } from './js/auth.js'
        import { initProfile, toggleEditForm, updateProfile } from './js/profile.js'
        
        window.logout = logout
        window.toggleEditForm = toggleEditForm
        window.updateProfile = updateProfile
        
        initProfile()
    </script>
</body>
</html>
