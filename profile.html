<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVA • Профиль</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/profile.css">
</head>
<body class="profile-page">
    <!-- Верхняя панель с логотипом и иконками -->        
        <!-- По центру NOVA -->
        <div class="profile-center">
            <span class="profile-logo-full">NOVA</span>
        </div>
        
        <!-- Справа иконки -->
        <div class="profile-right">
            <button class="profile-icon" onclick="window.location.href='feed.html'" title="Лента">📢</button>
            <button class="profile-icon" onclick="window.location.href='messages.html'" title="Сообщения">✉︎</button>
            <button class="profile-icon active" onclick="window.location.href='profile.html'" title="Профиль">👤</button>
        </div>
    </div>

    <!-- Основной контент профиля -->
    <div class="profile-container">
        <!-- Шапка профиля -->
        <div class="profile-header">
            <!-- Аватар -->
            <div class="profile-avatar">
                <div class="avatar" onclick="document.getElementById('avatarInput').click()">
                    <img id="avatarImg" class="avatar-img" src="" alt="" style="display: none;">
                    <span id="avatarText">?</span>
                </div>
                <input type="file" id="avatarInput" accept="image/*">
            </div>
            
            <!-- Информация -->
            <div class="profile-info">
                <div class="profile-name-row">
                    <span id="profileName" class="profile-username">Загрузка...</span>
                    <button class="profile-edit-btn" onclick="window.toggleEditForm()">Редактировать</button>
                </div>
                
                <div class="profile-stats">
                    <div class="stat">
                        <span class="stat-value" id="postsCount">0</span>
                        <span class="stat-label">публикаций</span>
                    </div>
                    <div class="stat">
                        <span class="stat-value" id="followersCount">0</span>
                        <span class="stat-label">подписчиков</span>
                    </div>
                    <div class="stat">
                        <span class="stat-value" id="followingCount">0</span>
                        <span class="stat-label">подписок</span>
                    </div>
                </div>
                
                <div class="profile-bio">
                    <div id="profileEmail" class="fullname"></div>
                    <div>🚀 Социальная сеть NOVA</div>
                </div>
            </div>
        </div>

        <!-- Форма редактирования -->
        <div id="editForm" class="edit-form">
            <h3>Редактировать профиль</h3>
            <div class="input-group">
                <input type="text" id="editUsername" required>
                <label>Имя пользователя</label>
            </div>
            <div class="input-group">
                <input type="email" id="editEmail" required>
                <label>Email</label>
            </div>
            <div class="form-actions">
                <button class="save-btn" onclick="window.updateProfile()">Сохранить</button>
                <button class="cancel-btn" onclick="window.toggleEditForm()">Отмена</button>
            </div>
        </div>

        <!-- Сетка постов -->
        <div class="profile-posts">
            <div class="posts-grid" id="postsList">
                <!-- Посты будут здесь -->
            </div>
        </div>
    </div>

    <script type="module">
        import { logout } from './js/auth.js'
        import { initProfile, toggleEditForm, updateProfile } from './js/profile.js'
        
        window.toggleEditForm = toggleEditForm
        window.updateProfile = updateProfile
        
        initProfile()
    </script>
</body>
</html>
