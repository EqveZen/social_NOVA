<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVA — Профиль</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/profile.css">
</head>
<body>
    <div class="reactions">
        <div class="reaction heart"></div>
        <div class="reaction star"></div>
        <div class="reaction like"></div>
        <div class="reaction heart"></div>
        <div class="reaction star"></div>
        <div class="reaction like"></div>
    </div>

    <div class="card profile-container">
        <div class="header">
            <div class="logo" style="font-size: 32px; margin: 0;">NOVA</div>
            <button class="logout-btn" onclick="window.logout()">Выйти</button>
        </div>

        <div class="nav-menu">
            <button class="nav-btn" onclick="window.location.href='feed.html'">Лента</button>
            <button class="nav-btn active" onclick="window.location.href='profile.html'">Профиль</button>
        </div>

        <div id="profileContent">
            <div class="profile-header">
                <div class="avatar" id="avatarContainer" onclick="document.getElementById('avatarInput').click()">
                    <img id="avatarImg" class="avatar-img" src="" alt="Avatar" style="display: none;">
                    <span id="avatarText">?</span>
                </div>
                <input type="file" id="avatarInput" accept="image/*">
                
                <div class="profile-info">
                    <div id="profileName" class="profile-name">Загрузка...</div>
                    <div id="profileEmail" class="profile-email"></div>
                    <div class="profile-stats">
                        <div class="stat">
                            <div class="stat-value" id="postsCount">0</div>
                            <div class="stat-label">постов</div>
                        </div>
                        <div class="stat">
                            <div class="stat-value" id="followersCount">0</div>
                            <div class="stat-label">подписчиков</div>
                        </div>
                        <div class="stat">
                            <div class="stat-value" id="followingCount">0</div>
                            <div class="stat-label">подписок</div>
                        </div>
                    </div>
                    <button class="edit-toggle" onclick="window.toggleEditForm()">✏️ Редактировать</button>
                </div>
            </div>

            <div id="editForm" class="edit-form">
                <h3>Редактировать профиль</h3>
                <div class="input-group">
                    <input type="text" id="editUsername" required>
                    <label>Имя пользователя</label>
                </div>
                <div class="input-group">
                    <input type="email" id="editEmail" required>
                    <label>Email</label>
                </div>
                <div class="form-actions">
                    <button class="save-btn" onclick="window.updateProfile()">💾 Сохранить</button>
                    <button class="cancel-btn" onclick="window.toggleEditForm()">✖ Отмена</button>
                </div>
            </div>

            <div id="userPosts">
                <h3>Мои посты</h3>
                <div id="postsList">
                    Загрузка постов...
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { logout } from './js/auth.js'
        import { initProfile, toggleEditForm, updateProfile } from './js/profile.js'
        
        // Делаем функции доступными в HTML
        window.logout = logout
        window.toggleEditForm = toggleEditForm
        window.updateProfile = updateProfile
        
        // Запускаем профиль
        initProfile()
    </script>
</body>
</html>
