<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVA • Профиль</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/profile.css">
</head>
<body class="profile-page">
    <!-- Верхняя панель с иконками -->
    <div class="profile-top-bar">
        <!-- Левая часть - ТВОЯ ИКОНКА ГАЗЕТЫ (временно оранжевый квадрат) -->
        <div class="profile-left">
            <div class="profile-newspaper-icon"></div>
        </div>
        
        <!-- Центр - NOVA -->
        <div class="profile-center">
            <span class="profile-logo-full">NOVA</span>
        </div>
        
        <!-- Правая часть - иконки SVG -->
        <div class="profile-right">
            <!-- Иконка Лента (дом) -->
            <button class="profile-icon feed-icon" onclick="window.location.href='feed.html'" title="Лента">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13v4h-4v2h4v4h2v-4h4v-2h-4V7h-2z"/>
                </svg>
            </button>
            
            <!-- Иконка Сообщения (конверт) -->
            <button class="profile-icon messages-icon" onclick="window.location.href='messages.html'" title="Сообщения">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                    <path d="M20 2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14l4 4V4c0-1.1-.9-2-2-2zm0 14H5.17L4 17.17V4h16v12zM7 9h10v2H7zm0 4h8v2H7z"/>
                </svg>
            </button>
            
            <!-- Иконка Профиль (человечек) - активная -->
            <button class="profile-icon active" onclick="window.location.href='profile.html'" title="Профиль">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                    <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- Основной контент профиля (остаётся без изменений) -->
    <div class="profile-container">
        <!-- ... весь остальной код профиля ... -->
    </div>

    <script type="module">
        import { initProfile, toggleEditForm, updateProfile } from './js/profile.js'
        
        window.toggleEditForm = toggleEditForm
        window.updateProfile = updateProfile
        
        initProfile()
    </script>
</body>
</html>
