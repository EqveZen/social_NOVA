<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVA • Регистрация</title>
    <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <h1>NOVA</h1>
                <p>мессенджер</p>
            </div>
            
            <form id="registerForm" class="auth-form">
                <div class="auth-input-group">
                    <input type="text" class="auth-input" id="regUsername" placeholder="Имя пользователя" required>
                </div>
                
                <div class="auth-input-group">
                    <input type="email" class="auth-input" id="regEmail" placeholder="Email" required>
                </div>
                
                <div class="auth-input-group">
                    <input type="password" class="auth-input" id="regPassword" placeholder="Пароль" required minlength="6">
                </div>
                
                <!-- КНОПКА ПО ЦЕНТРУ -->
                <button type="submit" class="auth-button">Зарегистрироваться</button>
                
                <div class="auth-links">
                    <a href="log.html" class="auth-link">Уже есть аккаунт? Войти</a>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { register } from './js/auth.js'
        
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault()
            
            const username = document.getElementById('regUsername').value.trim()
            const email = document.getElementById('regEmail').value.trim()
            const password = document.getElementById('regPassword').value
            
            await register(username, email, password)
        })
    </script>
</body>
</html>
