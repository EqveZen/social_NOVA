<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVA • Регистрация</title>
    <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <!-- Логотип как в Telegram -->
            <div class="auth-logo">
                <div class="auth-logo-icon">
                    <svg viewBox="0 0 24 24" fill="white">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/>
                    </svg>
                </div>
                <h1>NOVA</h1>
                <p>мессенджер</p>
            </div>
            
            <!-- Форма регистрации -->
            <form id="registerForm" class="auth-form">
                <div class="auth-input-group">
                    <input type="text" class="auth-input" id="regUsername" placeholder="Имя пользователя" required>
                </div>
                
                <div class="auth-input-group">
                    <input type="email" class="auth-input" id="regEmail" placeholder="Email" required>
                </div>
                
                <div class="auth-input-group">
                    <input type="password" class="auth-input" id="regPassword" placeholder="Пароль" required minlength="6">
                </div>
                
                <!-- Кнопка как в Telegram -->
                <button type="submit" class="auth-button">Зарегистрироваться</button>
                
                <div class="auth-links">
                    <a href="log.html" class="auth-link">Уже есть аккаунт? Войти</a>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { register } from './js/auth.js'
        
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault()
            
            const username = document.getElementById('regUsername').value.trim()
            const email = document.getElementById('regEmail').value.trim()
            const password = document.getElementById('regPassword').value
            
            await register(username, email, password)
        })
    </script>
</body>
</html>
