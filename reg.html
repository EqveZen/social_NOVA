<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVA — Регистрация</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="reactions">
        <div class="reaction heart"></div>
        <div class="reaction star"></div>
        <div class="reaction like"></div>
        <div class="reaction heart"></div>
        <div class="reaction star"></div>
        <div class="reaction like"></div>
    </div>

    <div class="card">
        <div class="logo">NOVA</div>
        
        <form id="registerForm">
            <div class="input-group">
                <input type="text" id="regUsername" required>
                <label>Логин</label>
            </div>
            
            <div class="input-group">
                <input type="email" id="regEmail" required>
                <label>Почта</label>
            </div>
            
            <div class="input-group">
                <input type="password" id="regPassword" required minlength="6">
                <label>Пароль (мин. 6 символов)</label>
            </div>
            
            <button type="submit">Зарегистрироваться</button>
            
            <div class="signup">
                Уже есть аккаунт? <a href="log.html">Войти!</a>
            </div>
        </form>
    </div>

    <script type="module">
        import { register } from 'js/auth.js'
        
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault()
            
            const username = document.getElementById('regUsername').value.trim()
            const email = document.getElementById('regEmail').value.trim()
            const password = document.getElementById('regPassword').value
            
            if (username.length < 3) {
                alert('Логин должен быть минимум 3 символа')
                return
            }
            
            if (password.length < 6) {
                alert('Пароль должен быть минимум 6 символов')
                return
            }
            
            await register(username, email, password)
        })
    </script>
</body>
</html>
